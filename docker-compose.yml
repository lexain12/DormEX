services:
  postgres:
    image: postgres:16
    pull_policy: never
    container_name: campus_exchange_postgres
    environment:
      POSTGRES_DB: campus_exchange
      POSTGRES_USER: campus_user
      POSTGRES_PASSWORD: campus_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_user -d campus_exchange"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    image: liquibase/liquibase:4.29
    pull_policy: never
    container_name: campus_exchange_liquibase
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=db.changelog-master.yaml
      - --url=jdbc:postgresql://postgres:5432/campus_exchange
      - --username=campus_user
      - --password=campus_pass
      - update
    volumes:
      - ./backend/liquibase/changelog:/liquibase/changelog

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: campus_exchange_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: campus-exchange-hub-01-backend:latest
    pull_policy: never
    container_name: campus_exchange_backend
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://campus_user:campus_pass@postgres:5432/campus_exchange
      AUTH_ALLOW_ANY_EMAIL_DOMAIN: ${AUTH_ALLOW_ANY_EMAIL_DOMAIN:-false}
      EMAIL_CODE_TTL_SEC: ${EMAIL_CODE_TTL_SEC:-600}
      EMAIL_CODE_RESEND_INTERVAL_SEC: ${EMAIL_CODE_RESEND_INTERVAL_SEC:-60}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_TIMEOUT_SEC: ${SMTP_TIMEOUT_SEC:-10}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@campus.test}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-dormex}
    ports:
      - "3000:3000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: campus-exchange-hub-01-nginx:latest
    pull_policy: never
    container_name: campus_exchange_nginx
    depends_on:
      - backend
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"

volumes:
  postgres_data:
