databaseChangeLog:
  - changeSet:
      id: 001-create-tasks-table
      author: codex
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: dorm
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: INTEGER
              - column:
                  name: payment_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: urgency
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: open
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 002-rebuild-mvp-schema
      author: codex
      changes:
        - sqlFile:
            path: sql/002_rebuild_mvp_schema.sql
            relativeToChangelogFile: true
  - changeSet:
      id: 003-add-username-password-auth
      author: codex
      changes:
        - sqlFile:
            path: sql/003_add_username_password_auth.sql
            relativeToChangelogFile: true
  - changeSet:
      id: 004-clear-demo-passwords
      author: codex
      changes:
        - sqlFile:
            path: sql/004_clear_demo_passwords.sql
            relativeToChangelogFile: true
