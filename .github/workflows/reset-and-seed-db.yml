name: Reset and seed database

on:
  workflow_dispatch:

jobs:
  reset-and-seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy seed files to server
        shell: bash
        run: |
          scp -P "${{ secrets.SERVER_PORT }}" db/seeds/truncate.sql \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/dormex_truncate.sql"
          scp -P "${{ secrets.SERVER_PORT }}" db/seeds/seed.sql \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/dormex_seed.sql"

      - name: Truncate and seed
        shell: bash
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" bash << 'ENDSSH'
            set -e
            echo "=== Truncating all user-data tables ==="
            docker exec -i campus_exchange_postgres psql \
              -U campus_user -d campus_exchange \
              < /tmp/dormex_truncate.sql
            echo "=== Applying seed data ==="
            docker exec -i campus_exchange_postgres psql \
              -U campus_user -d campus_exchange \
              < /tmp/dormex_seed.sql
            rm /tmp/dormex_truncate.sql /tmp/dormex_seed.sql
            echo "=== Reset and seed completed successfully ==="
          ENDSSH
