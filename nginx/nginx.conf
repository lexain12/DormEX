server {
    listen 80;
    listen [::]:80;

    server_name _;

    root /var/www/yjhv;
    index index.html;

    location = / {
        return 301 /dormex/;
    }

    location /dormex/assets/ {
        alias /var/www/yjhv/assets/;
        try_files $uri =404;
    }

    location /dormex/ {
        alias /var/www/yjhv/;
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }
}
