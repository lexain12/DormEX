server {
    server_name yjhv-solutions.ru;

    # Redirect bare root to /dormex/
    location = / {
        return 301 /dormex/;
    }

    # Proxy API requests to the backend container.
    # nginx strips the matched prefix when proxy_pass ends with a path,
    # so /dormex/api/... → http://127.0.0.1:3000/api/...
    # Backend routes are mounted at /api/v1/..., so this is correct.
    location /dormex/api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy all other /dormex/ requests to the Vite dev server (frontend container).
    # Includes WebSocket upgrade for Vite HMR.
    location /dormex/ {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_redirect     off;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/yjhv-solutions.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/yjhv-solutions.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = yjhv-solutions.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name yjhv-solutions.ru;
    return 404; # managed by Certbot
}
